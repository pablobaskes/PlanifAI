name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compilar proyecto con Maven
        run: mvn -B clean install -DskipTests

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imágenes Docker
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml build

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install curl and jq
        run: sudo apt-get update && sudo apt-get install -y curl jq
      - name: Run Docker Compose
        run: docker-compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml up -d --build
      - name: Run smoke test
        run: ./scripts/smoke-test.sh
