volumes:
  diet_service_postgres_data:
    external: true
    name: diet-service_postgres_data

services:
  frontend:
    build: ../planifai-front
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "4200:80"
    networks:
      - planifai-net

  api-gateway:
    environment:
      DIET_SERVICE_URI: http://diet-service:8083
      PLANIFAI_CORE_URI: http://planifai-core:8082
    depends_on:
      planifai-core:
        condition: service_healthy
      diet-service:
        condition: service_started

  diet-service:
    build: ../diet-service
    depends_on:
      postgres-diet:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DIET_DB_HOST}:${DIET_DB_PORT}/${DIET_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DIET_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DIET_DB_PASSWORD}
    ports:
      - "8083:8083"
    networks:
      - planifai-net

  postgres-diet:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DIET_DB_USER}
      POSTGRES_PASSWORD: ${DIET_DB_PASSWORD}
      POSTGRES_DB: ${DIET_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - diet_service_postgres_data:/var/lib/postgresql/data
    networks:
      - planifai-net
