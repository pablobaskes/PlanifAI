networks:
  planifai-net:
    driver: bridge

volumes:
  postgres_auth_data:

services:
  config-server:
    build: ./config/config-server
    networks:
      - planifai-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  eureka-server:
    build: ./discovery/eureka-server
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - planifai-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://eureka-server:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: on-failure

  api-gateway:
    build: ./gateway/api-gateway
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - planifai-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure

  auth-service:
    build: ./auth/auth-service
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-auth:
        condition: service_started
    networks:
      - planifai-net

  postgres-auth:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - planifai-net

