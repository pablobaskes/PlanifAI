spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    root: INFO
    org.springframework: WARN
    com.planifAI: DEBUG

app:
  security:
    jwt:
      refresh-token-expiry-seconds: 2592000