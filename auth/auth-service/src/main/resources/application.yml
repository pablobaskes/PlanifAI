spring:
  application:
    name: auth-service
  security:
    user:
      name: admin
      password: admin123
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/authdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: INFO

jwt:
  secret: ${JWT_SECRET}
  issuer: planifai
  access-token-expiration-sec: 900
  refresh-token-expiration-sec: 604800
