openapi: 3.0.3
info:
  title: PlanifAI Core API
  version: 0.1.0
  description: Contract-first API for PlanifAI core modules.
servers:
  - url: http://localhost:8082
paths:
  /api/tasks:
    get:
      tags:
        - Tasks
      operationId: getTasks
      summary: List tasks
      responses:
        '200':
          description: Tasks returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
    post:
      tags:
        - Tasks
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /api/finance/expenses:
    get:
      tags:
        - Finance
      operationId: getExpenses
      summary: List expenses
      parameters:
        - name: category
          in: query
          required: false
          description: Optional backend-controlled finance category filter.
          schema:
            $ref: '#/components/schemas/FinanceCategory'
      responses:
        '200':
          description: Expenses returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseResponse'
    post:
      tags:
        - Finance
      operationId: createExpense
      summary: Create expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseRequest'
      responses:
        '201':
          description: Expense created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseResponse'
  /api/finance/transactions:
    get:
      tags:
        - Finance
      operationId: getFinanceTransactions
      summary: List finance transactions
      description: Lists transaction-like finance records currently represented by expenses. This endpoint is read-only and supports category filtering.
      parameters:
        - name: category
          in: query
          required: false
          description: Optional backend-controlled finance category filter.
          schema:
            $ref: '#/components/schemas/FinanceCategory'
      responses:
        '200':
          description: Finance transactions returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseResponse'
  /api/finance/incomes:
    get:
      tags:
        - Finance
      operationId: getIncomes
      summary: List incomes
      responses:
        '200':
          description: Incomes returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncomeResponse'
    post:
      tags:
        - Finance
      operationId: createIncome
      summary: Create income
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomeRequest'
      responses:
        '201':
          description: Income created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeResponse'
  /api/finance/dashboard:
    get:
      tags:
        - Finance
      operationId: getFinanceDashboard
      summary: Get monthly finance dashboard
      parameters:
        - name: month
          in: query
          required: true
          description: Month to summarize using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Monthly finance dashboard returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceDashboardResponse'
  /api/finance/categories:
    get:
      tags:
        - Finance
      operationId: getFinanceCategories
      summary: List finance categories
      description: Returns the backend-controlled financial categories available for transactions and recurring expenses. Categories are fixed enums; user-created dynamic categories are not supported yet.
      responses:
        '200':
          description: Finance categories returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinanceCategoryResponse'
  /api/finance/statistics/categories:
    get:
      tags:
        - Finance
      operationId: getFinanceCategoryStatistics
      summary: Get expense statistics by category
      description: Returns deterministic monthly expense totals grouped by backend-controlled finance category. Categories without expense movement are omitted.
      parameters:
        - name: month
          in: query
          required: true
          description: Month to summarize using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Category statistics returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceCategoryStatisticsResponse'
  /api/finance/budgets:
    get:
      tags:
        - Finance
      operationId: getFinanceBudgets
      summary: List monthly category budgets
      description: Lists manually managed category budgets for a month. Budgets are planning records only and do not synchronize bank accounts, trigger payments, send push notifications, or perform AI categorization.
      parameters:
        - name: month
          in: query
          required: true
          description: Month to list using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Monthly budgets returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BudgetResponse'
    post:
      tags:
        - Finance
      operationId: createFinanceBudget
      summary: Create monthly category budget
      description: Creates a manually tracked monthly budget for a backend-controlled finance category. This endpoint does not create banking rules, push notifications, or automatic categorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '201':
          description: Budget created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetResponse'
  /api/finance/budgets/summary:
    get:
      tags:
        - Finance
      operationId: getFinanceBudgetSummary
      summary: Get monthly budget summary
      description: Returns monthly budget consumption grouped by category. Summary values are computed from manually tracked budgets and finance expenses only; no bank synchronization, push alerts, or AI categorization are triggered.
      parameters:
        - name: month
          in: query
          required: true
          description: Month to summarize using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Monthly budget summary returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSummaryResponse'
  /api/finance/budgets/{id}:
    get:
      tags:
        - Finance
      operationId: getFinanceBudgetById
      summary: Get budget by id
      description: Returns a manually tracked monthly category budget with computed consumption fields.
      parameters:
        - name: id
          in: path
          required: true
          description: Budget identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Budget returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetResponse'
        '404':
          description: Budget not found.
    put:
      tags:
        - Finance
      operationId: updateFinanceBudget
      summary: Update budget
      description: Updates a manually tracked monthly category budget. This does not affect bank accounts, notifications, or AI categorization.
      parameters:
        - name: id
          in: path
          required: true
          description: Budget identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '200':
          description: Budget updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetResponse'
        '404':
          description: Budget not found.
    delete:
      tags:
        - Finance
      operationId: deleteFinanceBudget
      summary: Delete budget
      description: Deletes a manually tracked monthly category budget. This does not delete expenses or change banking data.
      parameters:
        - name: id
          in: path
          required: true
          description: Budget identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Budget deleted.
        '404':
          description: Budget not found.
  /api/finance/savings-goals:
    get:
      tags:
        - Finance
      operationId: getSavingsGoals
      summary: List savings goals
      description: Lists medium and long-term savings goals tracked manually in PlanifAI. This endpoint does not create investment products, simulate interest, synchronize bank accounts, or manage shared goals.
      responses:
        '200':
          description: Savings goals returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavingsGoalResponse'
    post:
      tags:
        - Finance
      operationId: createSavingsGoal
      summary: Create savings goal
      description: Creates a manually tracked savings goal. The goal is informational only and does not trigger investments, interest simulations, shared goal flows, or banking integrations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingsGoalRequest'
      responses:
        '201':
          description: Savings goal created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoalResponse'
  /api/finance/savings-goals/summary:
    get:
      tags:
        - Finance
      operationId: getSavingsGoalsSummary
      summary: Get savings goals summary
      description: Returns aggregate savings goal progress and ETA planning data. Calculations are informational only and exclude investment products, interest simulations, shared goals, and banking integrations.
      responses:
        '200':
          description: Savings goals summary returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoalSummaryResponse'
  /api/finance/savings-goals/{id}:
    get:
      tags:
        - Finance
      operationId: getSavingsGoalById
      summary: Get savings goal by id
      description: Returns a manually tracked savings goal with progress and ETA fields.
      parameters:
        - name: id
          in: path
          required: true
          description: Savings goal identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Savings goal returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoalResponse'
        '404':
          description: Savings goal not found.
    put:
      tags:
        - Finance
      operationId: updateSavingsGoal
      summary: Update savings goal
      description: Updates a manually tracked savings goal. This does not trigger investments, interest simulations, shared goal flows, or banking integrations.
      parameters:
        - name: id
          in: path
          required: true
          description: Savings goal identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingsGoalRequest'
      responses:
        '200':
          description: Savings goal updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsGoalResponse'
        '404':
          description: Savings goal not found.
    delete:
      tags:
        - Finance
      operationId: deleteSavingsGoal
      summary: Delete savings goal
      description: Deletes a manually tracked savings goal from PlanifAI. This does not affect bank accounts, investments, or shared goals.
      parameters:
        - name: id
          in: path
          required: true
          description: Savings goal identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Savings goal deleted.
        '404':
          description: Savings goal not found.
  /api/finance/recurring-expenses:
    get:
      tags:
        - Finance
      operationId: getRecurringExpenses
      summary: List recurring expenses
      description: Lists manually managed recurring expenses and financial obligations. This endpoint does not create automatic payments and does not synchronize with banks.
      parameters:
        - name: category
          in: query
          required: false
          description: Optional backend-controlled finance category filter.
          schema:
            $ref: '#/components/schemas/FinanceCategory'
      responses:
        '200':
          description: Recurring expenses returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringExpenseResponse'
    post:
      tags:
        - Finance
      operationId: createRecurringExpense
      summary: Create recurring expense
      description: Creates a manually tracked recurring expense. No payment is executed and no bank synchronization is triggered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringExpenseRequest'
      responses:
        '201':
          description: Recurring expense created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringExpenseResponse'
  /api/finance/recurring-expenses/{id}:
    put:
      tags:
        - Finance
      operationId: updateRecurringExpense
      summary: Update recurring expense
      description: Updates a manually tracked recurring expense. No payment is executed and no bank synchronization is triggered.
      parameters:
        - name: id
          in: path
          required: true
          description: Recurring expense identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringExpenseRequest'
      responses:
        '200':
          description: Recurring expense updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringExpenseResponse'
        '404':
          description: Recurring expense not found.
    delete:
      tags:
        - Finance
      operationId: deleteRecurringExpense
      summary: Delete recurring expense
      description: Deletes a manually tracked recurring expense from PlanifAI. This does not cancel external subscriptions, execute payments, or synchronize with banks.
      parameters:
        - name: id
          in: path
          required: true
          description: Recurring expense identifier.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Recurring expense deleted.
        '404':
          description: Recurring expense not found.
  /api/finance/obligations/monthly-summary:
    get:
      tags:
        - Finance
      operationId: getMonthlyObligationsSummary
      summary: Get monthly obligations summary
      description: Projects manually tracked recurring obligations for a month. The projection is informational only; PlanifAI does not execute payments and does not synchronize with bank accounts.
      parameters:
        - name: month
          in: query
          required: true
          description: Month to project using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Monthly obligations summary returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyObligationsSummaryResponse'
components:
  schemas:
    TaskStatus:
      type: string
      enum: [TODO, IN_PROGRESS, DONE]
    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    TaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
        description:
          type: string
          maxLength: 1000
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        dueDate:
          type: string
          format: date
    TaskResponse:
      allOf:
        - $ref: '#/components/schemas/TaskRequest'
        - type: object
          required: [id, status, priority, createdAt]
          properties:
            id:
              type: integer
              format: int64
            createdAt:
              type: string
              format: date-time
    FinanceCategory:
      type: string
      description: Backend-controlled finance category used for expenses, transaction-like records, recurring expenses, projections, and dashboards. Dynamic user-created categories are intentionally deferred.
      enum: [FOOD, RESTAURANTS, TRANSPORT, HEALTH, EDUCATION, SUBSCRIPTIONS, SAVINGS, ENTERTAINMENT, TRAVEL, PETS, OTHER, HOUSING, UTILITIES]
    FinanceCategoryResponse:
      type: object
      required: [code, label]
      properties:
        code:
          $ref: '#/components/schemas/FinanceCategory'
        label:
          type: string
          description: Human-readable category label for UI display.
          example: Food
    FinanceCategoryStatisticItem:
      type: object
      required: [category, amount, percentage]
      properties:
        category:
          $ref: '#/components/schemas/FinanceCategory'
        amount:
          type: number
          format: double
          minimum: 0
          description: Total expenses for this category in the selected month.
        percentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Percentage of this category over total monthly expenses.
    FinanceCategoryStatisticsResponse:
      type: object
      required: [month, totalExpenses, categories]
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Month summarized using YYYY-MM format.
          example: '2026-05'
        totalExpenses:
          type: number
          format: double
          minimum: 0
          description: Total expenses for the selected month.
        categories:
          type: array
          description: Expense categories with movement in the selected month. Empty months return an empty array.
          items:
            $ref: '#/components/schemas/FinanceCategoryStatisticItem'
    IncomeCategory:
      type: string
      enum: [SALARY, RENTAL_INCOME, FREELANCE, INVESTMENT, SAVINGS, OTHER]
    Recurrence:
      type: string
      enum: [ONE_OFF, MONTHLY, YEARLY]
    ObligationPaymentStatus:
      type: string
      description: Manual projection status for an upcoming obligation. PAID_OR_REGISTERED means the user has registered or marked the obligation, not that PlanifAI executed a payment.
      enum: [PENDING, PAID_OR_REGISTERED]
    BudgetStatus:
      type: string
      description: Budget consumption status for a monthly category budget.
      enum: [OK, WARNING, EXCEEDED]
    BudgetAlertType:
      type: string
      description: Informational budget alert type. Alerts are returned in API responses only and do not represent push notifications or external messages.
      enum: [APPROACHING_LIMIT, BUDGET_EXCEEDED]
    FinancialHealthStatus:
      type: string
      enum: [GOOD, WARNING, BAD, NO_DATA]
    SavingsGoalCategory:
      type: string
      description: Backend-controlled savings goal category. User-created dynamic categories are intentionally deferred.
      enum: [EMERGENCY_FUND, TRAVEL, ELECTRONICS, CAR, HOME, EDUCATION, OTHER]
    SavingsGoalStatus:
      type: string
      description: Lifecycle status for a manually tracked savings goal.
      enum: [ACTIVE, COMPLETED, PAUSED, CANCELLED]
    ExpenseCategoryBreakdown:
      type: object
      required: [category, totalAmount, percentage]
      properties:
        category:
          $ref: '#/components/schemas/FinanceCategory'
        totalAmount:
          type: number
          format: double
          description: Total expense amount for this category in the selected month.
          minimum: 0
        percentage:
          type: number
          format: double
          description: Percentage of this category over total monthly expenses.
          minimum: 0
          maximum: 100
    FinanceDashboardResponse:
      type: object
      required:
        - month
        - totalIncome
        - totalExpenses
        - netBalance
        - savingsAmount
        - savingsRate
        - healthStatus
        - expensesByCategory
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Month summarized by the dashboard using YYYY-MM format.
          example: '2026-05'
        totalIncome:
          type: number
          format: double
          description: Total income for the selected month.
          minimum: 0
        totalExpenses:
          type: number
          format: double
          description: Total expenses for the selected month.
          minimum: 0
        netBalance:
          type: number
          format: double
          description: Total income minus total expenses.
        savingsAmount:
          type: number
          format: double
          description: Amount saved in the selected month.
        savingsRate:
          type: number
          format: double
          description: Savings percentage over total income. Empty-income months return 0 and healthStatus NO_DATA. Negative-balance months may return a negative savings rate.
          maximum: 100
        healthStatus:
          $ref: '#/components/schemas/FinancialHealthStatus'
        expensesByCategory:
          type: array
          description: Expense totals grouped by category. Empty months return an empty array.
          items:
            $ref: '#/components/schemas/ExpenseCategoryBreakdown'
    BudgetRequest:
      type: object
      description: Manual monthly budget definition for one backend-controlled finance category. This DTO does not create bank rules, push notifications, or AI categorization instructions.
      required: [month, category, limitAmount, active]
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Budget month using YYYY-MM format.
          example: '2026-05'
        category:
          $ref: '#/components/schemas/FinanceCategory'
        limitAmount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Maximum planned spend for the category in the selected month.
        active:
          type: boolean
          description: Whether this budget should be included in monthly summary calculations.
        notes:
          type: string
          maxLength: 1000
          description: Optional user notes for manual budgeting context.
    BudgetAlert:
      type: object
      description: Informational alert computed from budget consumption. Alerts are response data only; no push notification or external delivery is implied.
      required: [type, category, message, limitAmount, consumedAmount, threshold]
      properties:
        type:
          $ref: '#/components/schemas/BudgetAlertType'
        category:
          $ref: '#/components/schemas/FinanceCategory'
        limitAmount:
          type: number
          format: double
          minimum: 0
          description: Configured monthly budget limit for the alerted category.
        consumedAmount:
          type: number
          format: double
          minimum: 0
          description: Current consumed amount for the alerted category in the selected month.
        threshold:
          type: number
          format: double
          minimum: 0
          description: Consumption percentage threshold that produced the alert.
        message:
          type: string
          maxLength: 300
          description: Human-readable alert message for UI display.
    BudgetResponse:
      allOf:
        - $ref: '#/components/schemas/BudgetRequest'
        - type: object
          required:
            - id
            - consumedAmount
            - remainingAmount
            - overspentAmount
            - consumptionPercentage
            - status
            - alerts
          properties:
            id:
              type: integer
              format: int64
              description: Budget identifier.
            consumedAmount:
              type: number
              format: double
              minimum: 0
              description: Expenses consumed for this category in the budget month.
            remainingAmount:
              type: number
              format: double
              minimum: 0
              description: Remaining amount before reaching limitAmount. Exceeded budgets return 0.
            overspentAmount:
              type: number
              format: double
              minimum: 0
              description: Amount above limitAmount. Non-exceeded budgets return 0.
            consumptionPercentage:
              type: number
              format: double
              minimum: 0
              description: Percentage of limitAmount consumed by expenses in this category.
            status:
              $ref: '#/components/schemas/BudgetStatus'
            alerts:
              type: array
              description: Informational alerts for this budget. Empty when no warning or exceeded condition exists.
              items:
                $ref: '#/components/schemas/BudgetAlert'
    BudgetCategoryStatus:
      type: object
      description: Computed monthly budget status for one category. Values are derived from manually tracked expenses and budgets.
      required:
        - category
        - limitAmount
        - consumedAmount
        - remainingAmount
        - overspentAmount
        - consumptionPercentage
        - status
        - alerts
      properties:
        budgetId:
          type: integer
          format: int64
          nullable: true
          description: Source budget identifier when a budget exists for this category.
        category:
          $ref: '#/components/schemas/FinanceCategory'
        limitAmount:
          type: number
          format: double
          minimum: 0
          description: Configured monthly limit for the category.
        consumedAmount:
          type: number
          format: double
          minimum: 0
          description: Expenses consumed for this category in the selected month.
        remainingAmount:
          type: number
          format: double
          minimum: 0
          description: Remaining amount before reaching limitAmount. Exceeded categories return 0.
        overspentAmount:
          type: number
          format: double
          minimum: 0
          description: Amount above limitAmount. Non-exceeded categories return 0.
        consumptionPercentage:
          type: number
          format: double
          minimum: 0
          description: Percentage of limitAmount consumed by monthly expenses.
        status:
          $ref: '#/components/schemas/BudgetStatus'
        alerts:
          type: array
          description: Informational alerts for this category. Empty when no warning or exceeded condition exists.
          items:
            $ref: '#/components/schemas/BudgetAlert'
    BudgetSummaryResponse:
      type: object
      description: Monthly budget summary across active category budgets. This summary is informational and does not send notifications, synchronize banks, or modify expenses.
      required:
        - month
        - totalLimitAmount
        - totalConsumedAmount
        - totalRemainingAmount
        - totalOverspentAmount
        - overallConsumptionPercentage
        - status
        - categories
        - alerts
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Month summarized using YYYY-MM format.
          example: '2026-05'
        totalLimitAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of active budget limits for the selected month.
        totalConsumedAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of consumed expenses across active budget categories.
        totalRemainingAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of remaining amounts across active budgets.
        totalOverspentAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of overspent amounts across exceeded budgets.
        overallConsumptionPercentage:
          type: number
          format: double
          minimum: 0
          description: Percentage of totalLimitAmount consumed across active budgets. Months without active budget limits return 0.
        status:
          $ref: '#/components/schemas/BudgetStatus'
        categories:
          type: array
          description: Category-level budget statuses. Months without active budgets return an empty array.
          items:
            $ref: '#/components/schemas/BudgetCategoryStatus'
        alerts:
          type: array
          description: Aggregated informational alerts across the monthly budget summary.
          items:
            $ref: '#/components/schemas/BudgetAlert'
    SavingsGoalRequest:
      type: object
      description: Manual savings goal definition. This DTO does not represent an investment product, interest-bearing account, shared goal, or banking integration.
      required: [name, targetAmount, currentAmount, category, status]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Human-readable savings goal name, such as travel, emergency fund, electronics, car, or home improvements.
        targetAmount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Target amount the user wants to save.
        currentAmount:
          type: number
          format: double
          minimum: 0
          description: Current amount already saved toward the target.
        targetDate:
          type: string
          format: date
          description: Optional date by which the user would like to complete the goal.
        category:
          $ref: '#/components/schemas/SavingsGoalCategory'
        status:
          $ref: '#/components/schemas/SavingsGoalStatus'
        monthlySavingRate:
          type: number
          format: double
          minimum: 0
          description: Optional monthly saving amount used for ETA planning. It may later be calculated from user activity.
        notes:
          type: string
          maxLength: 1000
          description: Optional user notes. Notes must not be interpreted as investment or banking instructions.
    SavingsGoalResponse:
      allOf:
        - $ref: '#/components/schemas/SavingsGoalRequest'
        - type: object
          required:
            - id
            - remainingAmount
            - progressPercentage
            - monthlySavingRate
            - estimatedMonthsToCompletion
            - createdAt
          properties:
            id:
              type: integer
              format: int64
              description: Savings goal identifier.
            remainingAmount:
              type: number
              format: double
              minimum: 0
              description: Remaining amount to reach the target. Completed or over-funded goals return 0.
            progressPercentage:
              type: number
              format: double
              minimum: 0
              maximum: 100
              description: Current progress toward targetAmount, capped at 100 for completed or over-funded goals.
            estimatedMonthsToCompletion:
              type: integer
              format: int32
              minimum: 0
              nullable: true
              description: Estimated whole months until completion using monthlySavingRate. Null means ETA cannot be calculated yet.
            estimatedCompletionDate:
              type: string
              format: date
              nullable: true
              description: Estimated completion date based on monthlySavingRate. Null means ETA cannot be calculated yet.
            createdAt:
              type: string
              format: date-time
              description: Creation timestamp.
    SavingsGoalSummaryResponse:
      type: object
      description: Aggregate savings goals progress and ETA summary for dashboard widgets. This summary excludes investments, interest simulations, shared goals, and banking integrations.
      required:
        - totalGoals
        - activeGoals
        - completedGoals
        - pausedGoals
        - cancelledGoals
        - totalTargetAmount
        - totalCurrentAmount
        - totalRemainingAmount
        - overallProgressPercentage
        - monthlySavingRate
        - estimatedMonthsToCompletion
        - nearestGoalToComplete
      properties:
        totalGoals:
          type: integer
          format: int32
          minimum: 0
          description: Total number of savings goals.
        activeGoals:
          type: integer
          format: int32
          minimum: 0
          description: Number of active savings goals.
        completedGoals:
          type: integer
          format: int32
          minimum: 0
          description: Number of completed savings goals.
        pausedGoals:
          type: integer
          format: int32
          minimum: 0
          description: Number of paused savings goals.
        cancelledGoals:
          type: integer
          format: int32
          minimum: 0
          description: Number of cancelled savings goals.
        totalTargetAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of target amounts across tracked savings goals.
        totalCurrentAmount:
          type: number
          format: double
          minimum: 0
          description: Sum of current saved amounts across tracked savings goals.
        totalRemainingAmount:
          type: number
          format: double
          minimum: 0
          description: Sum still needed to complete all non-cancelled savings goals.
        overallProgressPercentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Aggregate progress percentage across tracked savings goals.
        monthlySavingRate:
          type: number
          format: double
          minimum: 0
          description: Aggregate monthly saving amount used for ETA planning.
        estimatedMonthsToCompletion:
          type: integer
          format: int32
          minimum: 0
          nullable: true
          description: Estimated months to complete all active savings goals. Null means ETA cannot be calculated yet.
        estimatedCompletionDate:
          type: string
          format: date
          nullable: true
          description: Estimated date to complete all active savings goals. Null means ETA cannot be calculated yet.
        nearestGoalToComplete:
          $ref: '#/components/schemas/SavingsGoalResponse'
          description: Active savings goal with the smallest remaining amount. Null when there are no active incomplete goals.
    RecurringExpenseRequest:
      type: object
      description: Manually managed recurring expense or financial obligation. This DTO never represents an automatic payment instruction or bank synchronization mandate.
      required: [name, amount, category, recurrence, paymentDay, startDate, active]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Human-readable obligation name, such as mortgage, rent, utility bill, insurance, or subscription.
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Expected recurring amount for projection and planning only.
        category:
          $ref: '#/components/schemas/FinanceCategory'
        recurrence:
          $ref: '#/components/schemas/Recurrence'
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          description: Preferred day of month used to project the obligation. Months with fewer days should use the last valid day for projection.
        startDate:
          type: string
          format: date
          description: Date from which the obligation starts being considered.
        endDate:
          type: string
          format: date
          description: Optional date after which the obligation should no longer be considered.
        active:
          type: boolean
          description: Whether this obligation is currently considered in monthly projections.
        notes:
          type: string
          maxLength: 1000
          description: Optional user notes. Notes must not be interpreted as payment authorization.
    RecurringExpenseResponse:
      allOf:
        - $ref: '#/components/schemas/RecurringExpenseRequest'
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              description: Recurring expense identifier.
    UpcomingPaymentItem:
      type: object
      description: Informational projection of a manually tracked obligation for the selected month. This item is not an automatic payment and does not imply bank synchronization.
      required: [recurringExpenseId, name, amount, category, dueDate, paymentDay, status]
      properties:
        recurringExpenseId:
          type: integer
          format: int64
          description: Source recurring expense identifier.
        name:
          type: string
          description: Projected payment name.
        amount:
          type: number
          format: double
          minimum: 0
          description: Projected amount for this month.
        category:
          $ref: '#/components/schemas/FinanceCategory'
        dueDate:
          type: string
          format: date
          description: Projected due date within the selected month.
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          description: Configured payment day from the recurring expense.
        status:
          $ref: '#/components/schemas/ObligationPaymentStatus'
    MonthlyObligationsSummaryResponse:
      type: object
      description: Monthly projection of manually tracked recurring obligations. It is informational and does not execute payments or synchronize bank data.
      required:
        - month
        - totalRecurringObligations
        - pendingObligations
        - paidOrRegisteredObligations
        - realAvailableMoney
        - upcomingPayments
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Month summarized using YYYY-MM format.
          example: '2026-05'
        totalRecurringObligations:
          type: number
          format: double
          minimum: 0
          description: Total projected obligations for the selected month.
        pendingObligations:
          type: number
          format: double
          minimum: 0
          description: Projected obligations not yet marked as paid or registered.
        paidOrRegisteredObligations:
          type: number
          format: double
          minimum: 0
          description: Projected obligations manually marked as paid or already registered as expenses.
        realAvailableMoney:
          type: number
          format: double
          description: Estimated money available after considering projected recurring obligations. It is planning information only.
        upcomingPayments:
          type: array
          description: Informational upcoming projected payments for the selected month. Empty months return an empty array.
          items:
            $ref: '#/components/schemas/UpcomingPaymentItem'
    ExpenseRequest:
      type: object
      required: [concept, amount, expenseDate, category]
      properties:
        concept:
          type: string
          minLength: 1
          maxLength: 160
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/FinanceCategory'
        recurrence:
          $ref: '#/components/schemas/Recurrence'
        notes:
          type: string
          maxLength: 1000
    ExpenseResponse:
      allOf:
        - $ref: '#/components/schemas/ExpenseRequest'
