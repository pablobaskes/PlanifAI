          properties:
            id:
              type: integer
              format: int64
    IncomeRequest:
      type: object
      required: [source, amount, incomeDate]
      properties:
        source:
          type: string
          minLength: 1
          maxLength: 160
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        incomeDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/IncomeCategory'
        recurrence:
          $ref: '#/components/schemas/Recurrence'
        notes:
          type: string
          maxLength: 1000
    IncomeResponse:
      allOf:
        - $ref: '#/components/schemas/IncomeRequest'
        - type: object
