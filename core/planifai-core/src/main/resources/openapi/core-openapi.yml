openapi: 3.0.3
info:
  title: PlanifAI Core API
  version: 0.1.0
  description: Contract-first API for PlanifAI core modules.
servers:
  - url: http://localhost:8082
paths:
  /api/tasks:
    get:
      tags:
        - Tasks
      operationId: getTasks
      summary: List tasks
      responses:
        '200':
          description: Tasks returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
    post:
      tags:
        - Tasks
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /api/finance/expenses:
    get:
      tags:
        - Finance
      operationId: getExpenses
      summary: List expenses
      responses:
        '200':
          description: Expenses returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseResponse'
    post:
      tags:
        - Finance
      operationId: createExpense
      summary: Create expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseRequest'
      responses:
        '201':
          description: Expense created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseResponse'
  /api/finance/incomes:
    get:
      tags:
        - Finance
      operationId: getIncomes
      summary: List incomes
      responses:
        '200':
          description: Incomes returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncomeResponse'
    post:
      tags:
        - Finance
      operationId: createIncome
      summary: Create income
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomeRequest'
      responses:
        '201':
          description: Income created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeResponse'
  /api/finance/dashboard:
    get:
      tags:
        - Finance
      operationId: getFinanceDashboard
      summary: Get monthly finance dashboard
      parameters:
        - name: month
          in: query
          required: true
          description: Month to summarize using YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-05'
      responses:
        '200':
          description: Monthly finance dashboard returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceDashboardResponse'
components:
  schemas:
    TaskStatus:
      type: string
      enum: [TODO, IN_PROGRESS, DONE]
    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    TaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 160
        description:
          type: string
          maxLength: 1000
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        dueDate:
          type: string
          format: date
    TaskResponse:
      allOf:
        - $ref: '#/components/schemas/TaskRequest'
        - type: object
          required: [id, status, priority, createdAt]
          properties:
            id:
              type: integer
              format: int64
            createdAt:
              type: string
              format: date-time
    ExpenseCategory:
      type: string
      enum: [MORTGAGE, RENTAL_PROPERTY, UTILITIES, GROCERIES, TRANSPORT, HEALTH, LEISURE, TAXES, OTHER]
    IncomeCategory:
      type: string
      enum: [SALARY, RENTAL_INCOME, FREELANCE, INVESTMENT, OTHER]
    Recurrence:
      type: string
      enum: [ONE_OFF, MONTHLY, YEARLY]
    FinancialHealthStatus:
      type: string
      enum: [GOOD, WARNING, BAD, NO_DATA]
    ExpenseCategoryBreakdown:
      type: object
      required: [category, totalAmount, percentage]
      properties:
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        totalAmount:
          type: number
          format: double
          description: Total expense amount for this category in the selected month.
          minimum: 0
        percentage:
          type: number
          format: double
          description: Percentage of this category over total monthly expenses.
          minimum: 0
          maximum: 100
    FinanceDashboardResponse:
      type: object
      required:
        - month
        - totalIncome
        - totalExpenses
        - netBalance
        - savingsAmount
        - savingsRate
        - healthStatus
        - expensesByCategory
      properties:
        month:
          type: string
          pattern: '^\d{4}-(0[1-9]|1[0-2])$'
          description: Month summarized by the dashboard using YYYY-MM format.
          example: '2026-05'
        totalIncome:
          type: number
          format: double
          description: Total income for the selected month.
          minimum: 0
        totalExpenses:
          type: number
          format: double
          description: Total expenses for the selected month.
          minimum: 0
        netBalance:
          type: number
          format: double
          description: Total income minus total expenses.
        savingsAmount:
          type: number
          format: double
          description: Amount saved in the selected month.
        savingsRate:
          type: number
          format: double
          description: Savings percentage over total income. Empty-income months return 0 and healthStatus NO_DATA.
          minimum: 0
          maximum: 100
        healthStatus:
          $ref: '#/components/schemas/FinancialHealthStatus'
        expensesByCategory:
          type: array
          description: Expense totals grouped by category. Empty months return an empty array.
          items:
            $ref: '#/components/schemas/ExpenseCategoryBreakdown'
    ExpenseRequest:
      type: object
      required: [concept, amount, expenseDate]
      properties:
        concept:
          type: string
          minLength: 1
          maxLength: 160
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        recurrence:
          $ref: '#/components/schemas/Recurrence'
        notes:
          type: string
          maxLength: 1000
    ExpenseResponse:
      allOf:
        - $ref: '#/components/schemas/ExpenseRequest'
        - type: object
          required: [id, category, recurrence]
          properties:
            id:
              type: integer
              format: int64
    IncomeRequest:
      type: object
      required: [source, amount, incomeDate]
      properties:
        source:
          type: string
          minLength: 1
          maxLength: 160
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        incomeDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/IncomeCategory'
        recurrence:
          $ref: '#/components/schemas/Recurrence'
        notes:
          type: string
          maxLength: 1000
    IncomeResponse:
      allOf:
        - $ref: '#/components/schemas/IncomeRequest'
        - type: object
          required: [id, category, recurrence]
          properties:
            id:
              type: integer
              format: int64
